name: Windows build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  CMAKE_PRESET: windows-clang-release
  VCPKG_DEFAULT_TRIPLET: x64-windows-static
  VCPKG_ROOT: ${{ github.workspace }}\vcpkg
  
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer command prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          echo "$env:VCPKG_ROOT" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/build/${{ env.CMAKE_PRESET }}/vcpkg_installed
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
            ${{ env.VCPKG_ROOT }}/downloads
            ${{ env.VCPKG_ROOT }}/buildtrees
          key: >
            vcpkg-${{ runner.os }}-${{ env.VCPKG_DEFAULT_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_DEFAULT_TRIPLET }}-

      - name: Configure
        run: cmake --preset ${{ env.CMAKE_PRESET }}

      - name: Build
        run: cmake --build --preset ${{ env.CMAKE_PRESET }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: runehelper-windows-x86_64
          path: build/${{ env.CMAKE_PRESET }}/RuneHelper.exe
